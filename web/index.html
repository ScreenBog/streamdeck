<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#08080c">
  <meta name="format-detection" content="telephone=no">
  <title>Deck</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="auth-screen" class="auth-screen hidden">
    <div class="auth-card">
      <div class="auth-logo">◆ Deck</div>
      <p>Введите PIN с экрана ПК</p>
      <input type="text" id="pin-input" inputmode="numeric" maxlength="8" placeholder="PIN" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      <button id="pin-submit" class="btn primary">Войти</button>
      <p id="pin-error" class="error hidden">Неверный PIN</p>
    </div>
  </div>

  <div id="app" class="app hidden">
    <header class="header">
      <div class="header-left">
        <div id="brand-mark" class="brand-mark">◆</div>
        <div class="header-titles">
          <h1 id="deck-title">Deck</h1>
          <div id="sys-status" class="sys-status" title="Нагрузка ПК">—</div>
        </div>
        <span id="conn-status" class="status offline" title="Связь">●</span>
      </div>
      <div class="header-right">
        <button id="btn-vol-quick" class="btn icon" title="Громкость" type="button">🔊</button>
        <button id="btn-edit" class="btn icon" title="Редактировать" type="button">✏️</button>
        <button id="btn-settings" class="btn icon" title="Настройки" type="button">⚙️</button>
      </div>
    </header>

    <nav id="page-tabs" class="page-tabs" aria-label="Страницы"></nav>

    <main class="deck-area">
      <!-- Полноэкранный плеер Я.Музыки -->
      <div id="music-full-panel" class="music-full hidden">
        <div class="ym-hero">
          <div class="ym-art" id="ym-art">♫</div>
          <div class="ym-now">
            <div class="ym-label">Сейчас играет</div>
            <div id="ym-artist" class="ym-artist">—</div>
            <div id="ym-track" class="ym-track">—</div>
            <div id="ym-status" class="ym-sub">
              <span id="ym-playing-dot" class="ym-dot"></span>
              <span id="ym-status-text">Ожидание…</span>
            </div>
          </div>
        </div>

        <div class="ym-transport">
          <button class="ym-btn" data-ym="prev" type="button" title="Предыдущий">⏮</button>
          <button class="ym-btn ym-play" data-ym="play_pause" type="button" title="Play/Pause">⏯</button>
          <button class="ym-btn" data-ym="next" type="button" title="Следующий">⏭</button>
        </div>

        <div class="ym-extra">
          <button class="ym-chip" data-ym="like" type="button">❤️ Лайк</button>
          <button class="ym-chip" data-ym="dislike" type="button">👎 Дизлайк</button>
          <button class="ym-chip" data-ym="shuffle" type="button">🔀</button>
          <button class="ym-chip" data-ym="repeat" type="button">🔁</button>
          <button class="ym-chip" data-ym="fullscreen" type="button">⛶</button>
        </div>

        <div class="ym-search-row">
          <input type="search" id="ym-search" enterkeyhint="search" placeholder="Трек, альбом, исполнитель…">
          <button id="ym-search-btn" class="btn primary" type="button">🔍</button>
        </div>

        <div class="ym-quick">
          <button class="ym-tile" data-ym="browser" type="button">🌐 Открыть</button>
          <button class="ym-tile" data-ym="my_wave" type="button">🎲 Волна</button>
          <button class="ym-tile" data-ym="collection" type="button">❤️ Коллекция</button>
          <button class="ym-tile" data-ym="playlists" type="button">📋 Плейлисты</button>
          <button class="ym-tile" data-ym="charts" type="button">📈 Чарты</button>
          <button class="ym-tile" data-ym="podcasts" type="button">🎙 Подкасты</button>
          <button class="ym-tile" data-ym="new_releases" type="button">🆕 Новинки</button>
          <button class="ym-tile" data-ym="history" type="button">🕐 История</button>
        </div>
      </div>

      <!-- Сетка кнопок -->
      <div class="deck-chassis" id="deck-chassis">
        <div id="deck-grid" class="deck-grid"></div>
      </div>
    </main>

    <!-- Нижний dock: now playing + volume -->
    <footer id="bottom-dock" class="bottom-dock">
      <div class="dock-now" id="dock-now">
        <button class="dock-play" id="dock-play" type="button" data-media="play_pause" title="Play/Pause">⏯</button>
        <div class="dock-meta">
          <div class="dock-track" id="dock-track">Нет трека</div>
          <div class="dock-artist" id="dock-artist">Нажми ▶ или открой музыку</div>
        </div>
        <button class="dock-skip" type="button" data-media="prev" title="Prev">⏮</button>
        <button class="dock-skip" type="button" data-media="next" title="Next">⏭</button>
      </div>
      <div class="dock-vol" id="dock-vol">
        <button type="button" class="dock-vol-btn" id="vol-down" title="-5%">🔉</button>
        <input type="range" id="sys-volume" min="0" max="100" value="50" aria-label="Громкость">
        <span class="vol-label" id="vol-label">50%</span>
        <button type="button" class="dock-vol-btn" id="vol-up" title="+5%">🔊</button>
        <button type="button" class="dock-vol-btn mute" id="vol-mute" title="Mute">🔇</button>
      </div>
      <div class="dock-presets" id="vol-presets">
        <button type="button" data-vol="0">0</button>
        <button type="button" data-vol="25">25</button>
        <button type="button" data-vol="50">50</button>
        <button type="button" data-vol="75">75</button>
        <button type="button" data-vol="100">100</button>
      </div>
    </footer>

    <div id="edit-bar" class="edit-bar hidden">
      <button id="btn-add" class="btn" type="button">+ Кнопка</button>
      <button id="btn-add-page" class="btn" type="button">+ Стр.</button>
      <button id="btn-rename-page" class="btn" type="button">✎</button>
      <button id="btn-delete-page" class="btn danger" type="button">−</button>
      <button id="btn-done" class="btn primary" type="button">Готово</button>
    </div>
  </div>

  <!-- Editor modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h2 id="modal-title">Редактировать кнопку</h2>
      <form id="btn-form">
        <input type="hidden" id="f-id">
        <div class="field-row">
          <label>Название</label>
          <input type="text" id="f-label" maxlength="20">
        </div>
        <div class="field-row">
          <label>Иконка (emoji)</label>
          <input type="text" id="f-icon" maxlength="4">
        </div>
        <div class="field-row">
          <label>Цвет</label>
          <input type="color" id="f-color" value="#1a1a2e">
        </div>
        <div class="field-row">
          <label>Тип действия</label>
          <select id="f-type">
            <option value="none">Пустая</option>
            <option value="hotkey">Горячая клавиша</option>
            <option value="yandex">Яндекс Музыка</option>
            <option value="audio">Громкость (точно)</option>
            <option value="app">Приложение</option>
            <option value="url">URL</option>
            <option value="shell">Shell-команда</option>
            <option value="text">Ввод текста</option>
            <option value="media">Медиа</option>
            <option value="system">Система</option>
            <option value="window">Окна</option>
            <option value="screenshot">Скриншот</option>
            <option value="clipboard">Буфер обмена</option>
            <option value="mouse">Мышь</option>
            <option value="obs">OBS</option>
            <option value="brightness">Яркость</option>
            <option value="macro">Макрос</option>
            <option value="folder">Папка (страница)</option>
            <option value="path">Открыть файл/папку</option>
          </select>
        </div>
        <div class="field-row hidden" id="f-preset-row">
          <label>Быстрый выбор</label>
          <select id="f-preset"></select>
        </div>
        <div class="field-row">
          <label id="f-value-label">Значение</label>
          <input type="text" id="f-value" placeholder="">
          <textarea id="f-value-area" class="hidden" rows="3"></textarea>
          <select id="f-value-select" class="hidden"></select>
        </div>
        <div class="field-row coords">
          <label>Позиция</label>
          <div class="coord-inputs">
            <span>Столбец <input type="number" id="f-col" min="0" max="9" value="0"></span>
            <span>Строка <input type="number" id="f-row" min="0" max="9" value="0"></span>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" id="btn-delete" class="btn danger">Удалить</button>
          <button type="button" id="btn-cancel" class="btn">Отмена</button>
          <button type="submit" class="btn primary">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Settings -->
  <div id="settings-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h2>Настройки Deck</h2>
      <form id="settings-form">
        <div class="field-row">
          <label>Название</label>
          <input type="text" id="s-title" maxlength="30">
        </div>
        <div class="field-row">
          <label>Столбцов</label>
          <input type="number" id="s-cols" min="1" max="10" value="5">
        </div>
        <div class="field-row">
          <label>Строк</label>
          <input type="number" id="s-rows" min="1" max="10" value="3">
        </div>
        <div class="field-row">
          <label>PIN (пусто = без пароля)</label>
          <input type="text" id="s-pin" maxlength="8" autocomplete="off" inputmode="numeric">
        </div>
        <div class="field-row">
          <label>OBS WebSocket пароль</label>
          <input type="text" id="s-obs-pass" autocomplete="off" placeholder="OBS → Инструменты → WebSocket">
        </div>
        <div class="field-row">
          <label>Яндекс Музыка</label>
          <select id="s-ym-mode">
            <option value="browser">Браузер (Chrome/Edge)</option>
            <option value="app">Десктоп-приложение</option>
          </select>
        </div>
        <div class="field-row">
          <label>Браузер для музыки</label>
          <select id="s-browser">
            <option value="auto">Авто</option>
            <option value="chrome">Chrome</option>
            <option value="edge">Edge</option>
          </select>
        </div>
        <div class="field-row">
          <label>Акцент Deck</label>
          <input type="color" id="s-accent" value="#7c6cf0">
        </div>
        <div class="field-row">
          <label>Акцент Я.Музыки</label>
          <input type="color" id="s-ym-accent" value="#ffcc00">
        </div>
        <div class="field-row">
          <label>Скругление кнопок</label>
          <input type="range" id="s-radius" min="8" max="28" value="16">
        </div>
        <div class="field-row">
          <label><input type="checkbox" id="s-glow" checked> Свечение кнопок</label>
        </div>
        <div class="field-row">
          <label><input type="checkbox" id="s-compact"> Компактные кнопки</label>
        </div>
        <div class="field-row">
          <label><input type="checkbox" id="s-haptics" checked> Вибрация на телефоне</label>
        </div>
        <div class="field-row settings-io">
          <button type="button" id="s-export" class="btn">Экспорт</button>
          <label class="btn file-btn">Импорт<input type="file" id="s-import" accept=".json" hidden></label>
          <button type="button" id="s-logs" class="btn">Логи</button>
        </div>
        <div class="modal-actions">
          <button type="button" id="s-cancel" class="btn">Отмена</button>
          <button type="submit" class="btn primary">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <div id="logs-overlay" class="modal-overlay hidden">
    <div class="modal logs-modal">
      <h2>Логи сервера</h2>
      <pre id="logs-body" class="logs-body">Загрузка…</pre>
      <div class="modal-actions">
        <button type="button" id="logs-refresh" class="btn">Обновить</button>
        <button type="button" id="logs-close" class="btn primary">Закрыть</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/static/app.js"></script>
</body>
</html>
